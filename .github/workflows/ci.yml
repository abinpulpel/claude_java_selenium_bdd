name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run against"
        required: false
        default: "chrome"
        type: choice
        options:
          - chrome
          - firefox
      env:
        description: "Environment overlay"
        required: false
        default: "qa"
        type: choice
        options:
          - qa
          - staging
          - prod

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Static analysis (SpotBugs)
        run: mvn -B com.github.spotbugs:spotbugs-maven-plugin:check
        continue-on-error: true

      - name: Run Cucumber suite
        run: >
          mvn -B clean test
          -Dbrowser=${{ matrix.browser }}
          -Denv=${{ github.event.inputs.env || 'qa' }}
          -Dheadless=true

      - name: Generate coverage report
        if: always()
        run: mvn -B jacoco:report

      - name: Upload Surefire results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-results-${{ matrix.browser }}
          path: target/surefire-reports/

      - name: Upload Cucumber reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports-${{ matrix.browser }}
          path: target/cucumber-reports/

      - name: Upload Extent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report-${{ matrix.browser }}
          path: target/reports/

      - name: Upload failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}
          path: target/screenshots/

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.browser }}
          path: target/site/jacoco/
